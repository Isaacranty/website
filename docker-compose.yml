version: '3.9'
services:
  traefik:
    image: traefik:v3.0
    command:
      - --providers.docker=true
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --api.dashboard=true
      - --log.level=INFO
      - --metrics.prometheus=true
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  frontend:
    image: nginx:stable-alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`blog.kirengaisaac.com`)
      - traefik.http.routers.frontend.entrypoints=http
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=http
      - traefik.http.services.frontend.loadbalancer.server.port=80
    depends_on:
      - traefik

  node-api:
    build: ./api/node
    labels:
      - traefik.enable=true
      - traefik.http.routers.node-api.rule=Host(`localhost`) && PathPrefix(`/api/node`)
      - traefik.http.routers.node-api.entrypoints=http
      - traefik.http.routers.node-api.middlewares=node-api-strip
      - traefik.http.middlewares.node-api-strip.stripprefix.prefixes=/api/node
      - traefik.http.services.node-api.loadbalancer.server.port=3000
    environment:
      - NODE_ENV=production

  python-api:
    build: ./api/python
    labels:
      - traefik.enable=true
      - traefik.http.routers.python-api.rule=Host(`localhost`) && PathPrefix(`/api/python`)
      - traefik.http.routers.python-api.entrypoints=http
      - traefik.http.routers.python-api.middlewares=python-api-strip
      - traefik.http.middlewares.python-api-strip.stripprefix.prefixes=/api/python
      - traefik.http.services.python-api.loadbalancer.server.port=5000
    environment:
      - FLASK_ENV=production

  go-api:
    build: ./api/go
    labels:
      - traefik.enable=true
      - traefik.http.routers.go-api.rule=Host(`localhost`) && PathPrefix(`/api/go`)
      - traefik.http.routers.go-api.entrypoints=http
      - traefik.http.routers.go-api.middlewares=go-api-strip
      - traefik.http.middlewares.go-api-strip.stripprefix.prefixes=/api/go
      - traefik.http.services.go-api.loadbalancer.server.port=8081

  php-api:
    build: ./api/php
    labels:
      - traefik.enable=true
      - traefik.http.routers.php-api.rule=Host(`localhost`) && PathPrefix(`/api/php`)
      - traefik.http.routers.php-api.entrypoints=http
      - traefik.http.routers.php-api.middlewares=php-api-strip
      - traefik.http.middlewares.php-api-strip.stripprefix.prefixes=/api/php
      - traefik.http.services.php-api.loadbalancer.server.port=8082
    
networks:
  default:
    external: false
