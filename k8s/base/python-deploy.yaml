apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-api
  template:
    metadata:
      labels:
        app: python-api
    spec:
      containers:
      - name: python-api
        image: python:3.12-slim
        command: ['sh', '-c', 'cd /app && pip install -r requirements.txt && python service.py']
        workingDir: /app
        volumeMounts:
        - name: app-code
          mountPath: /app
      volumes:
      - name: app-code
        hostPath:
          path: /workspace/api/python
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: python-api
spec:
  selector:
    app: python-api
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: polyglot.local
    http:
      paths:
      - path: /api/python
        pathType: Prefix
        backend:
          service:
            name: python-api
            port:
              number: 5000
